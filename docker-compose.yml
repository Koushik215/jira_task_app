services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: meeting_intelligence
      MYSQL_USER: meeting_user
      MYSQL_PASSWORD: meeting_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      MYSQL_HOST: mysql
    volumes:
      - ./backend:/workspace/backend
    ports:
      - "8000:8000"
    depends_on:
      - mysql

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      VITE_API_BASE: http://localhost:8000
    volumes:
      - ./frontend:/workspace/frontend
      - /workspace/frontend/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mysql_data:
